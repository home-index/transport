<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THAKUR LOGISTICS | PRO SCANNER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00d4ff; --glow: #39ff14; --dark: #0a0b10; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Scanner UI */
        #scannerModal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #canvasContainer { position: relative; border: 2px solid #333; cursor: crosshair; }
        canvas { max-width: 90vw; max-height: 70vh; display: block; }
        .handle { width: 26px; height: 26px; background: var(--glow); border: 3px solid #fff; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--glow); z-index: 20; }
        
        /* Buttons */
        .controls { display: flex; gap: 15px; margin-top: 20px; width: 90%; max-width: 400px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-warp { background: var(--glow); color: #000; }
        .btn-skip { background: #444; color: #fff; }

        /* Main Screen */
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; margin: 20px; text-align: center; border: 1px dashed var(--neon); }
    </style>
</head>
<body>

<div id="scannerModal">
    <h2 style="color:var(--neon); font-size: 14px; letter-spacing: 2px;">ADJUST 4 CORNERS TO STRAIGHTEN</h2>
    <div id="canvasContainer">
        <canvas id="srcCanvas"></canvas>
        <div id="h0" class="handle"></div>
        <div id="h1" class="handle"></div>
        <div id="h2" class="handle"></div>
        <div id="h3" class="handle"></div>
    </div>
    <div class="controls">
        <button onclick="processWarp()" class="btn btn-warp">Straighten & Next</button>
        <button onclick="skip()" class="btn btn-skip">Skip</button>
    </div>
    <p id="status" style="margin-top:15px; font-size:11px; color:#666;"></p>
</div>

<div id="mainUI" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
    <div class="card">
        <h1 style="color:var(--neon)">THAKUR LOGISTICS</h1>
        <p>Upload up to 100 images to straighten and convert to A4 PDF</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="margin: 20px 0;">
        <button onclick="startBatch()" class="btn btn-warp" style="width:200px">Start Scanning</button>
    </div>
</div>

<script>
    let files = [], currentIdx = 0, results = [];
    let pts = [], activeImg = new Image();
    const canvas = document.getElementById('srcCanvas');
    const ctx = canvas.getContext('2d');

    function startBatch() {
        const input = document.getElementById('fileInput');
        if(!input.files.length) return alert("Select images");
        files = Array.from(input.files).slice(0, 100);
        currentIdx = 0; results = [];
        loadImg();
    }

    function loadImg() {
        const reader = new FileReader();
        reader.onload = (e) => {
            activeImg.onload = () => {
                document.getElementById('scannerModal').style.display = 'flex';
                canvas.width = activeImg.width;
                canvas.height = activeImg.height;
                // Auto-set points to corners with 10% margin
                pts = [
                    {x: canvas.width * 0.1, y: canvas.height * 0.1},
                    {x: canvas.width * 0.9, y: canvas.height * 0.1},
                    {x: canvas.width * 0.9, y: canvas.height * 0.9},
                    {x: canvas.width * 0.1, y: canvas.height * 0.9}
                ];
                updateUI();
            };
            activeImg.src = e.target.result;
            document.getElementById('status').innerText = `IMAGE ${currentIdx+1} / ${files.length}`;
        };
        reader.readAsDataURL(files[currentIdx]);
    }

    function updateUI() {
        ctx.drawImage(activeImg, 0, 0);
        ctx.strokeStyle = "#39ff14"; ctx.lineWidth = canvas.width/100;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath(); ctx.stroke();
        ctx.fillStyle = "rgba(57, 255, 20, 0.2)"; ctx.fill();

        const rect = canvas.getBoundingClientRect();
        pts.forEach((p, i) => {
            const h = document.getElementById('h' + i);
            h.style.left = (p.x * (rect.width/canvas.width)) + "px";
            h.style.top = (p.y * (rect.height/canvas.height)) + "px";
            h.onmousedown = (e) => {
                document.onmousemove = (m) => {
                    const r = canvas.getBoundingClientRect();
                    p.x = (m.clientX - r.left) / (r.width/canvas.width);
                    p.y = (m.clientY - r.top) / (r.height/canvas.height);
                    updateUI();
                };
                document.onmouseup = () => document.onmousemove = null;
            };
        });
    }

    // THE WARP ENGINE - Converts 4 skewed points into a flat A4 rectangle
    function processWarp() {
        const out = document.createElement('canvas');
        out.width = 1240; out.height = 1754; // A4 High Res
        const octx = out.getContext('2d');

        // We use a triangle-mesh warp strategy to flatten the image
        // Slicing the quadrilateral into two triangles and mapping them
        warpTriangle(octx, activeImg, pts[0], pts[1], pts[3], {x:0,y:0}, {x:out.width,y:0}, {x:0,y:out.height});
        warpTriangle(octx, activeImg, pts[1], pts[2], pts[3], {x:out.width,y:0}, {x:out.width,y:out.height}, {x:0,y:out.height});

        results.push(out.toDataURL('image/jpeg', 0.8));
        next();
    }

    function warpTriangle(ctx, img, p0, p1, p2, out0, out1, out2) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(out0.x, out0.y); ctx.lineTo(out1.x, out1.y); ctx.lineTo(out2.x, out2.y);
        ctx.closePath(); ctx.clip();

        // Calculate transformation matrix
        const delta = p0.x * (p1.y - p2.y) + p1.x * (p2.y - p0.y) + p2.x * (p0.y - p1.y);
        const a = (out0.x * (p1.y - p2.y) + out1.x * (p2.y - p0.y) + out2.x * (p0.y - p1.y)) / delta;
        const b = (out0.x * (p2.x - p1.x) + out1.x * (p0.x - p2.x) + out2.x * (p1.x - p0.x)) / delta;
        const c = (out0.x * (p1.x * p2.y - p2.x * p1.y) + out1.x * (p2.x * p0.y - p0.x * p2.y) + out2.x * (p0.x * p1.y - p1.x * p0.y)) / delta;
        const d = (out0.y * (p1.y - p2.y) + out1.y * (p2.y - p0.y) + out2.y * (p0.y - p1.y)) / delta;
        const e = (out0.y * (p2.x - p1.x) + out1.y * (p0.x - p2.x) + out2.y * (p1.x - p0.x)) / delta;
        const f = (out0.y * (p1.x * p2.y - p2.x * p1.y) + out1.y * (p2.x * p0.y - p0.x * p2.y) + out2.y * (p0.x * p1.y - p1.x * p0.y)) / delta;

        ctx.transform(a, d, b, e, c, f);
        ctx.drawImage(img, 0, 0);
        ctx.restore();
    }

    function next() {
        currentIdx++;
        if(currentIdx < files.length) loadImg();
        else finalize();
    }

    function finalize() {
        document.getElementById('scannerModal').style.display = 'none';
        const doc = new jspdf.jsPDF('p', 'mm', 'a4');
        results.forEach((img, i) => {
            if(i > 0) doc.addPage();
            doc.addImage(img, 'JPEG', 0, 0, 210, 297);
        });
        doc.save(`STRAIGHTENED_LOGISTICS_${Date.now()}.pdf`);
    }
</script>
</body>
</html>
